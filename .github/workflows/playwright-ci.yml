name: Playwright BDD Parallel Matrix Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Set global environment variables across all parallel matrix jobs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false 
      matrix:
        test-type: [ui, api] 

    name: Execute ${{ matrix.test-type }} Tests
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Pinned Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright System Binaries (UI Node Only)
        if: matrix.test-type == 'ui'
        run: |
          playwright install --with-deps chromium

      - name: Run Matrix Test Subsets
        run: |
          if [ "${{ matrix.test-type }}" = "ui" ]; then
            pytest -m ui -s -n 2
          else
            pytest -m api -s
          fi

      - name: Upload Test Report (${{ matrix.test-type }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report-${{ matrix.test-type }}
          path: report.html
          if-no-files-found: ignore
